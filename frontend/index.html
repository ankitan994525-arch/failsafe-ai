 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FailSafe AI Predictive Maintenance</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        dark: '#1e293b',
                        light: '#f8fafc',
                        safe: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-radius: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [temperature, setTemperature] = React.useState('75');
            const [vibration, setVibration] = React.useState('1.2');
            const [rpm, setRpm] = React.useState('4500');
            const [result, setResult] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [history, setHistory] = React.useState([]);
            const chartInstance = React.useRef(null);

            const fetchHistory = async () => {
                try {
                    const response = await fetch('http://127.0.0.1:8000/api/machine-health/history');
                    if(response.ok) {
                        const data = await response.json();
                        setHistory(data);
                    }
                } catch (error) {
                    console.error("Error fetching history", error);
                }
            };

            React.useEffect(() => {
                fetchHistory();
            }, [result]); // Refresh history whenever a new check is completed
          React.useEffect(() => {
    if (history.length === 0) return;

    const labels = history.slice(0, 10).map(item =>
        new Date(item.timestamp).toLocaleTimeString()
    );

    const data = history.slice(0, 10).map(item => item.risk_score);
    const canvas = document.getElementById('riskChart');
if (!canvas) return;



    const ctx = document.getElementById('riskChart').getContext('2d');

    if (chartInstance.current) {
        chartInstance.current.destroy();
    }

    chartInstance.current = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Risk Score',
                data: data,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true
        }
    });

}, [history]);  

            const handleCheck = async (e) => {
                e.preventDefault();
                setLoading(true);
                setResult(null);

                try {
                    const payload = {
                        temperature: parseFloat(temperature),
                        vibration: parseFloat(vibration),
                        rpm: parseFloat(rpm)
                    };

                    const response = await fetch('http://127.0.0.1:8000/api/machine-health/check', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if(!response.ok) {
                        throw new Error(`HTTP Error: ${response.status}`);
                    }

                    const data = await response.json();
                    setResult(data);
                } catch (error) {
                    console.error("Error during check", error);
                    alert("Error communicating with the backend. Ensure FastAPI and MongoDB are running.");
                } finally {
                    setLoading(false);
                }
            };

            const getStatusColor = (status) => {
                if (status === 'Safe') return 'text-safe bg-green-50 border-safe';
                if (status === 'Medium Risk') return 'text-warning bg-orange-50 border-warning';
                return 'text-danger bg-red-50 border-danger';
            };

            const getBadgeColor = (status) => {
                if (status === 'Safe') return 'bg-safe text-white';
                if (status === 'Medium Risk') return 'bg-warning text-white';
                return 'bg-danger text-white';
            }

            return (
                <div className="min-h-screen text-dark pb-12">
                    {/* Header */}
                    <div className="bg-dark text-white pt-10 pb-20 px-6 shadow-md border-b-4 border-primary">
                        <div className="max-w-6xl mx-auto flex items-center justify-between">
                            <div>
                                <h1 className="text-4xl font-bold tracking-tight">FailSafe<span className="text-primary font-light">AI</span></h1>
                                <p className="text-gray-400 mt-2 text-lg">Predictive Maintenance System</p>
                            </div>
                            <div className="hidden md:flex space-x-6 text-sm font-medium">
                                <a href="#" className="hover:text-primary transition-colors">Dashboard</a>
                                <a href="#" className="hover:text-primary transition-colors">Sensors</a>
                                <a href="#" className="hover:text-primary transition-colors">Alerts</a>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-6 -mt-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        {/* Input Form Area */}
                        <div className="lg:col-span-1">
                            <div className="glass-card p-6 h-full">
                                <h2 className="text-xl font-semibold mb-6 flex items-center gap-2">
                                    <svg className="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                                    Sensor Input
                                </h2>
                                <form onSubmit={handleCheck} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Temperature (°C)</label>
                                        <input 
                                            type="number" step="0.1" required
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                                            value={temperature}
                                            onChange={(e) => setTemperature(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Vibration (mm/s)</label>
                                        <input 
                                            type="number" step="0.1" required
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                                            value={vibration}
                                            onChange={(e) => setVibration(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">RPM (Revolutions/min)</label>
                                        <input 
                                            type="number" step="1" required
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                                            value={rpm}
                                            onChange={(e) => setRpm(e.target.value)}
                                        />
                                    </div>
                                    <button 
                                        type="submit" 
                                        disabled={loading}
                                        className="w-full mt-4 bg-primary hover:bg-blue-600 text-white font-medium py-3 px-4 rounded-lg shadow-sm hover:shadow-md transition-all flex justify-center items-center gap-2"
                                    >
                                        {loading ? (
                                            <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                        ) : "Check Machine Health"}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Results & History Area */}
                        <div className="lg:col-span-2 space-y-8">
                            
                            {/* Current Result */}
                            {result ? (
                                <div className={`glass-card p-6 border-l-8 transition-all ${getStatusColor(result.status)}`}>
                                    <h2 className="text-xl font-semibold mb-4 text-gray-800">Latest Risk Assessment</h2>
                                    <div className="flex flex-col sm:flex-row items-center justify-between gap-6">
                                        
                                        <div className="flex-1 w-full flex items-center justify-center sm:justify-start gap-4">
                                            <div className="flex flex-col items-center justify-center p-4 bg-white rounded-full h-32 w-32 shadow-sm border border-gray-100 relative">
                                                <span className="text-gray-500 text-xs font-bold uppercase tracking-wider absolute top-4">Score</span>
                                                <span className="text-4xl font-black mt-2 text-gray-800">{result.risk_score}</span>
                                            </div>
                                            <div className="text-left">
                                                <span className={`px-4 py-1.5 rounded-full text-sm font-bold shadow-sm ${getBadgeColor(result.status)}`}>
                                                    {result.status === 'Safe' ? '🟢' : result.status === 'Medium Risk' ? '🟠' : '🔴'} {result.status}
                                                </span>
                                                {result.issues && result.issues.length > 0 && (
                                                    <div className="mt-4">
                                                        <p className="text-xs text-gray-500 font-semibold uppercase mb-2">Detected Issues:</p>
                                                        <ul className="text-sm font-medium text-gray-700 flex flex-wrap gap-2">
                                                            {result.issues.map((issue, idx) => (
                                                                <li key={idx} className="bg-white/80 border border-gray-200 px-3 py-1 rounded-md">{issue}</li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                )}
                                                {(!result.issues || result.issues.length === 0) && (
                                                    <p className="mt-4 text-sm text-gray-600 font-medium">All sensor parameters are within normal thresholds.</p>
                                                )}
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            ) : (
                                <div className="glass-card p-6 flex flex-col items-center justify-center text-gray-400 py-16 border-dashed border-2 bg-gray-50/50">
                                    <svg className="w-16 h-16 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    <p className="text-lg font-medium text-gray-500">Run a health check to view predictive insights here.</p>
                                </div>
                            )}

                            {/* History Table */}
                            <div className="glass-card p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-semibold text-gray-800">Assessment History</h2>
                                    <button onClick={fetchHistory} className="text-primary hover:text-blue-700 text-sm font-medium flex gap-1 items-center">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                        Refresh
                                    </button>
                                </div>
                                <div className="glass-card p-6">
    <h2 className="text-xl font-semibold mb-4">Risk Score Graph</h2>
    <canvas id="riskChart" height="100"></canvas>
</div>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="text-xs text-gray-500 bg-gray-50 uppercase border-y border-gray-100">
                                            <tr>
                                                <th className="px-4 py-3 font-semibold">Date/Time</th>
                                                <th className="px-4 py-3 font-semibold">Parameters</th>
                                                <th className="px-4 py-3 font-semibold">Score</th>
                                                <th className="px-4 py-3 font-semibold">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {history.length > 0 ? history.slice(0, 10).map((item, idx) => (
                                                <tr key={idx} className="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                                                    <td className="px-4 py-3 text-gray-500 font-medium">
                                                        {new Date(item.timestamp).toLocaleString()}
                                                    </td>
                                                    <td className="px-4 py-3 text-xs text-gray-600">
                                                        <span className="mr-2">🌡️ {item.temperature}°C</span>
                                                        <span className="mr-2">〰️ {item.vibration}mm/s</span>
                                                        <span>⚙️ {item.rpm}RPM</span>
                                                    </td>
                                                    <td className="px-4 py-3 font-semibold text-gray-700">{item.risk_score}</td>
                                                    <td className="px-4 py-3">
                                                        <span className={`px-2 py-1 rounded text-xs font-semibold ${getBadgeColor(item.status)}`}>
                                                            {item.status}
                                                        </span>
                                                    </td>
                                                </tr>
                                            )) : (
                                                <tr>
                                                    <td colSpan="4" className="px-4 py-8 text-center text-gray-400">
                                                        No history available in database.
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                        {history.length > 10 && (
                                            <tfoot className="bg-gray-50">
                                                <tr>
                                                    <td colSpan="4" className="px-4 py-2 text-center text-xs text-gray-500">
                                                        Showing latest 10 records.
                                                    </td>
                                                </tr>
                                            </tfoot>
                                        )}
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
